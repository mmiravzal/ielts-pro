<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IELTS Pro — Reading Full Test</title>
<link rel="stylesheet" href="shared.css"/>
<style>
:root{
  --rt-bg:#fff;--rt-surface:#fff;--rt-surface-alt:#f7f7f7;--rt-text:#111;--rt-text-muted:#444;
  --rt-text-secondary:#667;--rt-border:#dbe1ea;--rt-accent:var(--navy,#1a56a0);--rt-accent-soft:#eaf1fb;
  --rt-ok:#2e7d32;--rt-ok-soft:#e8f5e9;--rt-bad:#b71c1c;--rt-bad-soft:#ffebee;
  --rt-topbar-h:56px;
}
.rft *{box-sizing:border-box}
.rft{height:100vh;display:flex;flex-direction:column;overflow:hidden;background:var(--rt-bg);color:var(--rt-text);font-family:'Inter',Arial,sans-serif}
.rft header.rft-topbar{height:var(--rt-topbar-h);display:flex;align-items:center;justify-content:space-between;padding:0 18px;background:var(--rt-surface);border-bottom:1px solid var(--rt-border);flex-shrink:0;position:relative}
.rft-title{font-size:15px;font-weight:700}
.rft-timer{position:absolute;left:50%;transform:translateX(-50%);font-size:18px;font-weight:700;font-family:'Courier New',monospace;padding:4px 16px;border:2px solid var(--rt-accent);border-radius:6px;color:var(--rt-accent);min-width:88px;text-align:center}
.rft-timer.warn{color:#e65100;border-color:#e65100}
.rft-timer.danger{color:var(--rt-bad);border-color:var(--rt-bad);animation:rftpulse 1s infinite}
@keyframes rftpulse{0%,100%{opacity:1}50%{opacity:.55}}
.rft main.rft-layout{flex:1;display:flex;min-height:0}
.rft .passage-panel{width:48%;border-right:2px solid var(--rt-border);overflow-y:auto;padding:22px 26px 80px;flex-shrink:0;font-size:15px;line-height:1.65}
.rft .passage-panel h3{font-size:1.05em;font-weight:700;margin-bottom:10px}
.rft .passage-panel p{margin-bottom:12px;text-align:justify}
.rft .q-panel{flex:1;overflow-y:auto;overflow-x:hidden;padding:18px 22px 100px}
.rft .passage-tabs{display:flex;border-bottom:2px solid var(--rt-border);margin-bottom:14px;flex-shrink:0;gap:2px}
.rft .ptab{padding:8px 18px;cursor:pointer;font-size:14px;font-weight:600;color:var(--rt-text-secondary);border-bottom:3px solid transparent;margin-bottom:-2px;transition:color .15s,border-color .15s;background:none;border-top:none;border-left:none;border-right:none}
.rft .ptab.active{color:var(--rt-accent);border-bottom-color:var(--rt-accent)}
.rft .ptab:hover{color:var(--rt-text)}
.rft .q-block-title{font-size:14px;font-weight:700;margin:14px 0 6px}
.rft footer.rft-footer{flex-shrink:0;display:flex;justify-content:flex-end;gap:10px;padding:10px 18px;border-top:1px solid var(--rt-border);background:var(--rt-surface)}
</style>
</head>
<body>

<div id="screen-student" class="screen active rft">
  <header class="rft-topbar">
    <div class="rft-title" id="rft-test-title">IELTS Reading Full Test</div>
    <div class="rft-timer" id="rft-timer">--:--</div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="nav-user" style="font-size:12px">Logged in as <strong id="nav-student-name"></strong></div>
      <button class="btn-nav-logout" style="padding:6px 12px;font-size:12px" onclick="logout()">Logout</button>
    </div>
  </header>

  <main class="rft-layout" id="rft-layout">
    <div class="passage-panel" id="rft-passage-panel">Loading…</div>
    <div class="q-panel">
      <div class="passage-tabs" id="rft-tabs"></div>
      <div id="rft-questions"></div>
    </div>
  </main>

  <footer class="rft-footer">
    <button class="btn btn-success" id="rft-submit-btn" onclick="submitFullTest()">Submit Test</button>
  </footer>
</div>

<!-- RESULTS -->
<div id="view-results" style="display:none">
  <div style="max-width:560px;margin:60px auto;text-align:center">
    <div class="reading-task-card" style="padding:40px 32px">
      <div style="font-size:44px;margin-bottom:10px">📖</div>
      <h2 style="font-family:'Sora',sans-serif;color:var(--navy);margin-bottom:6px">Reading Test Complete</h2>
      <p style="color:var(--muted);font-size:14px;margin-bottom:24px" id="results-task-title"></p>
      <div style="font-family:'Sora',sans-serif;font-size:3rem;font-weight:800;color:var(--green)" id="results-score"></div>
      <div style="color:var(--muted);font-size:13px;margin-bottom:28px">correct, auto-graded</div>
      <button class="btn btn-primary" style="width:auto;padding:13px 32px" onclick="goBackToLesson()">Back to Lessons</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="shared.js"></script>
<script>
let S = { student:null, task:null, lesson:null, currentSubmission:null, activePassage:0, timerInterval:null, secondsLeft:0 };

function goBackToLesson(){
  const lessonId = S.task ? S.task.lesson_id : '';
  window.location.href = `student.html?lesson=${lessonId}&mode=reading`;
}

// ── per-question renderers (mirrors reading-test.html, reused as-is so
// grading/data shape stays identical across both reading task types) ──
function renderQuestionHtml(q, qi, saved, isSubmitted){
  if(q.type==='gap_fill' || q.type==='short_answer'){
    return `<div class="q-item">
      <div class="q-num">${qi+1}</div>
      <div style="flex:1">
        <div class="q-label" style="margin-bottom:6px">${q.question||''}</div>
        <input class="q-input${isSubmitted?((saved||'').toLowerCase().trim()===(q.answer||'').toLowerCase().trim()?' correct':' wrong'):''}"
          id="qa_${qi}" value="${saved||''}" ${isSubmitted?'disabled':''} placeholder="Your answer"/>
        ${isSubmitted?`<div style="font-size:12px;color:var(--muted);margin-top:4px">Answer: <strong>${q.answer||''}</strong></div>`:''}
      </div>
    </div>`;
  }
  if(q.type==='tfng' || q.type==='ynng'){
    const opts = q.type==='ynng' ? ['Yes','No','Not Given'] : ['True','False','Not Given'];
    return `<div class="q-item" style="flex-direction:column;align-items:flex-start;gap:8px">
      <div style="display:flex;gap:10px;align-items:flex-start">
        <div class="q-num">${qi+1}</div>
        <div class="q-label">${q.question||''}</div>
      </div>
      <div class="tf-option-list" style="margin-left:34px;max-width:260px;width:100%">
        ${opts.map(o=>{
          const isSelected = saved===o;
          const correct = q.answer||'';
          let cls = isSelected ? 'selected' : '';
          if(isSubmitted && isSelected) cls = saved===correct?'correct':'wrong';
          if(isSubmitted && o===correct && !isSelected) cls='correct';
          return `<div class="tf-option-radio ${cls}" id="qa_${qi}_${o}" ${isSubmitted?'':`onclick="selectTFNG(${qi},'${o}')"`}><span class="tf-dot"></span><span>${o}</span></div>`;
        }).join('')}
      </div>
      ${isSubmitted?`<div style="font-size:12px;color:var(--muted);margin-left:34px">Answer: <strong>${q.answer||''}</strong></div>`:''}
    </div>`;
  }
  if(q.type==='mcq'){
    const opts = q.options||[];
    return `<div style="margin-bottom:16px">
      <div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:8px">
        <div class="q-num">${qi+1}</div>
        <div class="q-label">${q.question||''}</div>
      </div>
      <div style="margin-left:34px">
        ${opts.map((o,oi)=>{
          const letter=String.fromCharCode(65+oi);
          let cls='';
          if(isSubmitted){ if(saved===letter) cls=saved===q.answer?'correct':'wrong'; if(letter===q.answer) cls='correct'; }
          else if(saved===letter) cls='selected';
          return `<div class="mcq-option ${cls}" id="qa_${qi}_${letter}" onclick="selectMCQ(${qi},'${letter}')" ${isSubmitted?'style="cursor:default"':''}>
            <div class="mcq-letter">${letter}</div>
            <div class="mcq-text">${o}</div>
          </div>`;
        }).join('')}
      </div>
      ${isSubmitted?`<div style="font-size:12px;color:var(--muted);margin-left:34px;margin-top:4px">Answer: <strong>${q.answer||''}</strong></div>`:''}
    </div>`;
  }
  if(q.type==='mcq_multi'){
    const opts = q.options||[];
    const correctSet = q.answer||[];
    const maxPick = q.maxAnswers || correctSet.length || 2;
    const savedArr = Array.isArray(saved) ? saved : [];
    return `<div style="margin-bottom:16px">
      <div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:8px">
        <div class="q-num">${qi+1}</div>
        <div class="q-label">${q.question||''} <span style="color:var(--muted);font-size:12px;font-weight:600">(choose ${maxPick})</span></div>
      </div>
      <div style="margin-left:34px">
        ${opts.map((o,oi)=>{
          const letter=String.fromCharCode(65+oi);
          const isChecked = savedArr.includes(letter);
          let cls='';
          if(isSubmitted){
            if(isChecked) cls = correctSet.includes(letter)?'correct':'wrong';
            else if(correctSet.includes(letter)) cls='correct';
          } else if(isChecked) cls='selected';
          const clickAttr = isSubmitted ? 'style="cursor:default"' : `onclick="toggleMcqMulti(${qi},'${letter}',${maxPick})"`;
          return `<div class="mcq-option ${cls}" id="qa_${qi}_${letter}" ${clickAttr}>
            <div class="mcq-letter">${isChecked?'☑':'☐'}</div>
            <div class="mcq-text">${o}</div>
          </div>`;
        }).join('')}
      </div>
      ${isSubmitted?`<div style="font-size:12px;color:var(--muted);margin-left:34px;margin-top:4px">Answers: <strong>${correctSet.join(', ')}</strong></div>`:''}
    </div>`;
  }
  if(q.type==='matching' || q.type==='sentence_endings'){
    const items = q.items||[];
    const matchOptions = q.matchOptions||[];
    const isSentEndings = q.type==='sentence_endings';
    const savedMatch = saved && typeof saved==='object' ? saved : {};
    if(q.type==='matching' && q.grid){
      return `<div class="q-item" style="flex-direction:column;align-items:flex-start;gap:10px">
        <div style="display:flex;gap:10px;align-items:flex-start">
          <div class="q-num">${qi+1}</div>
          <div class="q-label">${q.question||''}</div>
        </div>
        <div class="table-container" style="margin-left:34px;width:calc(100% - 34px)">
          <table class="matching-table">
            <thead><tr><th style="text-align:left">Statement</th>${matchOptions.map(o=>`<th>${o}</th>`).join('')}</tr></thead>
            <tbody>
              ${items.map((it,ii)=>{
                const itemSaved = savedMatch[ii]||'';
                return `<tr>
                  <td class="statement">${it.label}</td>
                  ${matchOptions.map((o,oi)=>{
                    const isSelected = itemSaved===o;
                    let cls = isSelected ? 'clickable-cell selected' : 'clickable-cell';
                    if(isSubmitted){
                      cls = isSelected ? (itemSaved===it.answer?'correct':'incorrect') : (o===it.answer?'correct-answer-highlight':'');
                    }
                    const clickAttr = isSubmitted ? '' : `onclick="selectMatchingGridCell(${qi},${ii},'${(o||'').replace(/'/g,"\\'")}',${oi})"`;
                    return `<td class="${cls}" data-grid-row="${qi}_${ii}" data-grid-col="${oi}" ${clickAttr}></td>`;
                  }).join('')}
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
        ${isSubmitted?`<div style="font-size:12px;color:var(--muted);margin-left:34px">Green = correct answer column for each row.</div>`:''}
      </div>`;
    }
    return `<div class="q-item" style="flex-direction:column;align-items:flex-start;gap:10px">
      <div style="display:flex;gap:10px;align-items:flex-start">
        <div class="q-num">${qi+1}</div>
        <div class="q-label">${q.question||''}</div>
      </div>
      <div style="margin-left:34px;width:100%">
        <div class="hint-text" style="margin-bottom:8px">Options: ${matchOptions.map((o,oi)=>`<strong>${isSentEndings?String.fromCharCode(65+oi):oi+1}.</strong> ${o}`).join('&nbsp;&nbsp;')}</div>
        ${items.map((it,ii)=>{
          const itemSaved = savedMatch[ii]||'';
          const key = (oi)=> isSentEndings?String.fromCharCode(65+oi):matchOptions[oi];
          const isCorrect = itemSaved===it.answer;
          return `<div style="display:flex;gap:8px;align-items:center;margin-bottom:6px;flex-wrap:wrap">
            <span style="min-width:140px;font-size:13px">${it.label}</span>
            <select id="qa_${qi}_${ii}" ${isSubmitted?'disabled':''} onchange="selectMatching(${qi},${ii},this.value)"
              class="${isSubmitted?(isCorrect?'q-input correct':'q-input wrong'):'q-input'}" style="flex:1;min-width:120px">
              <option value="">Choose…</option>
              ${matchOptions.map((o,oi)=>`<option value="${key(oi).replace(/"/g,'&quot;')}" ${itemSaved===key(oi)?'selected':''}>${isSentEndings?String.fromCharCode(65+oi):o}</option>`).join('')}
            </select>
            ${isSubmitted?`<span style="font-size:12px;color:var(--muted)">Answer: <strong>${it.answer}</strong></span>`:''}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }
  if(q.type==='diagram_label'){
    const items = q.items||[];
    const savedMatch = saved && typeof saved==='object' ? saved : {};
    return `<div class="q-item" style="flex-direction:column;align-items:flex-start;gap:10px">
      <div style="display:flex;gap:10px;align-items:flex-start">
        <div class="q-num">${qi+1}</div>
        <div class="q-label">${q.question||''}</div>
      </div>
      ${q.image_url?`<img src="${q.image_url}" style="max-width:100%;border-radius:8px;margin-left:34px"/>`:''}
      <div style="margin-left:34px;width:100%">
        ${items.map((it,ii)=>{
          const itemSaved = savedMatch[ii]||'';
          const isCorrect = itemSaved.toLowerCase().trim()===(it.answer||'').toLowerCase().trim();
          return `<div style="display:flex;gap:8px;align-items:center;margin-bottom:6px">
            <span style="min-width:60px;font-size:13px;font-weight:600">${it.label}</span>
            <input id="qa_${qi}_${ii}" value="${itemSaved}" ${isSubmitted?'disabled':''} onchange="selectDiagramLabel(${qi},${ii},this.value)"
              class="q-input${isSubmitted?(isCorrect?' correct':' wrong'):''}" style="flex:1;max-width:220px" placeholder="Your answer"/>
            ${isSubmitted?`<span style="font-size:12px;color:var(--muted)">Answer: <strong>${it.answer}</strong></span>`:''}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }
  if(q.type==='table_completion'||q.type==='summary_completion'||q.type==='flow_chart'||q.type==='note_completion'){
    const items = q.items||[];
    const savedMatch = saved && typeof saved==='object' ? saved : {};
    let contextHtml = (q.context||'').replace(/</g,'&lt;');
    contextHtml = contextHtml.replace(/\{(\d+)\}/g, (m,n)=>{
      const idx = parseInt(n)-1;
      const it = items[idx]||{answer:''};
      const itemSaved = savedMatch[idx]||'';
      const isCorrect = itemSaved.toLowerCase().trim()===(it.answer||'').toLowerCase().trim();
      const answerHint = isSubmitted?`<span style="font-size:11px;color:var(--muted)"> (${it.answer||''})</span>`:'';
      return `<input id="qa_${qi}_${idx}" value="${itemSaved}" ${isSubmitted?'disabled':''}
        class="q-input${isSubmitted?(isCorrect?' correct':' wrong'):''}"
        style="display:inline-block;width:120px;padding:4px 8px;margin:0 4px;vertical-align:middle"
        placeholder="${n}" onchange="selectTableItem(${qi},${idx},this.value)"/>${answerHint}`;
    });
    const typeLabels = {table_completion:'Table Completion',summary_completion:'Summary Completion',flow_chart:'Flow-Chart Completion',note_completion:'Note Completion'};
    const typeLabel = typeLabels[q.type]||q.type;
    return `<div class="q-item" style="flex-direction:column;align-items:flex-start;gap:8px">
      <div style="display:flex;gap:10px;align-items:flex-start">
        <div class="q-num">${qi+1}</div>
        <div>
          <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">${typeLabel}</div>
          <div class="q-label">${q.question||('Complete the '+typeLabel+' below. Write NO MORE THAN TWO WORDS.')}</div>
        </div>
      </div>
      <div style="margin-left:34px;width:100%;background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:14px;font-size:14px;line-height:2.2">
        ${contextHtml||'<span style="color:var(--muted)">No context text set yet.</span>'}
      </div>
    </div>`;
  }
  return '';
}

let CURRENT_ANSWERS = {};

function selectTFNG(qi, val) {
  if(S.currentSubmission) return;
  const opts=['True','False','Not Given','Yes','No'];
  opts.forEach(o=>{ const b=document.getElementById(`qa_${qi}_${o}`); if(b) b.classList.remove('selected'); });
  const b=document.getElementById(`qa_${qi}_${val}`); if(b) b.classList.add('selected');
  CURRENT_ANSWERS[qi]=val;
}
function selectMCQ(qi, letter) {
  if(S.currentSubmission) return;
  const data=S.testData; const opts=data.questions[qi]?.options||[];
  opts.forEach((_,oi)=>{ const l=String.fromCharCode(65+oi); const el=document.getElementById(`qa_${qi}_${l}`); if(el) el.classList.remove('selected'); });
  const el=document.getElementById(`qa_${qi}_${letter}`); if(el) el.classList.add('selected');
  CURRENT_ANSWERS[qi]=letter;
}
function selectMatching(qi, ii, value){ if(!CURRENT_ANSWERS[qi] || typeof CURRENT_ANSWERS[qi]!=='object') CURRENT_ANSWERS[qi]={}; CURRENT_ANSWERS[qi][ii]=value; }
function selectMatchingGridCell(qi, ii, value, oi){
  if(S.currentSubmission) return;
  selectMatching(qi, ii, value);
  document.querySelectorAll(`[data-grid-row="${qi}_${ii}"]`).forEach(td=>td.classList.remove('selected'));
  const cell = document.querySelector(`[data-grid-row="${qi}_${ii}"][data-grid-col="${oi}"]`);
  if(cell) cell.classList.add('selected');
}
function toggleMcqMulti(qi, letter, maxPick){
  if(S.currentSubmission) return;
  let arr = Array.isArray(CURRENT_ANSWERS[qi]) ? CURRENT_ANSWERS[qi].slice() : [];
  if(arr.includes(letter)) arr = arr.filter(x=>x!==letter);
  else { if(arr.length>=maxPick) arr.shift(); arr.push(letter); }
  CURRENT_ANSWERS[qi]=arr;
  renderActivePassage();
}
function selectDiagramLabel(qi, ii, value){ if(!CURRENT_ANSWERS[qi] || typeof CURRENT_ANSWERS[qi]!=='object') CURRENT_ANSWERS[qi]={}; CURRENT_ANSWERS[qi][ii]=value; }
function selectTableItem(qi, ii, value){ if(!CURRENT_ANSWERS[qi] || typeof CURRENT_ANSWERS[qi]!=='object') CURRENT_ANSWERS[qi]={}; CURRENT_ANSWERS[qi][ii]=value; }

// gap_fill / short_answer inputs are read directly at submit time, like reading-test.html

function renderPassageTabs(passages){
  document.getElementById('rft-tabs').innerHTML = passages.map((p,pi)=>
    `<button class="ptab ${pi===S.activePassage?'active':''}" onclick="switchPassage(${pi})">${p.title?('Passage '+(pi+1)+': '+p.title):('Passage '+(pi+1))}</button>`
  ).join('');
}

function switchPassage(pi){
  S.activePassage=pi;
  renderActivePassage();
}

function renderActivePassage(){
  const data = S.testData;
  const passages = data.passages||[];
  const p = passages[S.activePassage]||{title:'',html:''};
  document.getElementById('rft-passage-panel').innerHTML = `<h3>${p.title?('Passage '+(S.activePassage+1)+': '+p.title):('Passage '+(S.activePassage+1))}</h3>${p.html||''}`;
  renderPassageTabs(passages);

  const isSubmitted = !!S.currentSubmission;
  const savedAnswers = S.savedAnswers||{};
  if(!isSubmitted) CURRENT_ANSWERS = savedAnswers;

  const qHtml = (data.questions||[]).map((q,qi)=>{
    if((q.passage||0)!==S.activePassage) return '';
    const saved = isSubmitted ? savedAnswers[qi] : CURRENT_ANSWERS[qi];
    try{
      return renderQuestionHtml(q, qi, saved, isSubmitted);
    }catch(err){
      console.error(`Question ${qi+1} (type "${q.type}") failed to render:`, err);
      return `<div class="q-item" style="border:1px solid var(--rt-bad);background:var(--rt-bad-soft);border-radius:8px;padding:10px 14px;color:var(--rt-bad);font-size:13px">
        Question ${qi+1} (${q.type||'unknown type'}) couldn't be displayed — ${err.message}. Check its data in the admin builder.
      </div>`;
    }
  }).join('');

  let scoreHtml='';
  if(isSubmitted){
    const {correct,total} = gradeQuestions(data.questions, savedAnswers);
    scoreHtml = `<div class="result-bar" style="margin-top:16px">
      <div class="result-score">Overall score: <span class="correct">${correct}</span><span class="total">/${total}</span> correct</div>
      <span class="submitted-badge">✓ Submitted</span>
    </div>`;
  }

  document.getElementById('rft-questions').innerHTML = qHtml || '<div class="empty-state"><div class="icon">📭</div><h3>No questions for this passage</h3></div>';
  if(S.activePassage===passages.length-1) document.getElementById('rft-questions').insertAdjacentHTML('beforeend', scoreHtml);

  if(!isSubmitted){
    (data.questions||[]).forEach((q,qi)=>{
      const saved = savedAnswers[qi];
      if(saved && (q.type==='tfng'||q.type==='ynng')){ const btn=document.getElementById(`qa_${qi}_${saved}`); if(btn) btn.classList.add('selected'); }
      if(saved && q.type==='mcq'){ const el=document.getElementById(`qa_${qi}_${saved}`); if(el) el.classList.add('selected'); }
    });
  }
}

function collectAnswers(){
  const data = S.testData;
  const answers = {};
  (data.questions||[]).forEach((q,qi)=>{
    if(q.type==='gap_fill' || q.type==='short_answer'){
      const inp=document.getElementById(`qa_${qi}`);
      answers[qi] = inp ? inp.value.trim() : (CURRENT_ANSWERS[qi]||'');
    } else if(q.type==='tfng' || q.type==='ynng' || q.type==='mcq'){
      answers[qi] = CURRENT_ANSWERS[qi]||'';
    } else if(q.type==='mcq_multi'){
      answers[qi] = CURRENT_ANSWERS[qi]||[];
    } else {
      answers[qi] = CURRENT_ANSWERS[qi]||{};
    }
  });
  return answers;
}

// before switching tabs / submitting, capture any text-input values
// (gap_fill/short_answer/diagram_label/table inputs) for the passage
// currently on screen, since they aren't tracked in CURRENT_ANSWERS live.
function captureVisibleInputs(){
  const data = S.testData;
  (data.questions||[]).forEach((q,qi)=>{
    if((q.passage||0)!==S.activePassage) return;
    if(q.type==='gap_fill' || q.type==='short_answer'){
      const inp=document.getElementById(`qa_${qi}`); if(inp) CURRENT_ANSWERS[qi]=inp.value.trim();
    } else if(q.type==='diagram_label'){
      const items=q.items||[]; const ans={};
      items.forEach((it,ii)=>{ const inp=document.getElementById(`qa_${qi}_${ii}`); if(inp) ans[ii]=inp.value.trim(); });
      CURRENT_ANSWERS[qi]=ans;
    } else if(q.type==='table_completion'||q.type==='summary_completion'||q.type==='flow_chart'||q.type==='note_completion'){
      const items=q.items||[]; const ans=CURRENT_ANSWERS[qi]&&typeof CURRENT_ANSWERS[qi]==='object'?CURRENT_ANSWERS[qi]:{};
      items.forEach((_,ii)=>{ const inp=document.getElementById(`qa_${qi}_${ii}`); if(inp) ans[ii]=inp.value.trim(); });
      CURRENT_ANSWERS[qi]=ans;
    }
  });
}

const _switchPassage = switchPassage;
switchPassage = function(pi){ captureVisibleInputs(); _switchPassage(pi); };

async function submitFullTest(){
  captureVisibleInputs();
  const answers = collectAnswers();
  const {correct, total} = gradeQuestions(S.testData.questions, answers);
  try{
    await post('submissions',{student_id:S.student.id, task_id:S.task.id, answer:JSON.stringify(answers), score:correct, total});
    stopTimer();
    showResults(S.task, correct, total);
  }catch(e){ toast(e.message,'error'); }
}

function showResults(task, correct, total){
  document.getElementById('results-task-title').textContent = task.title;
  document.getElementById('results-score').innerHTML = `${correct}<span style="color:var(--muted);font-size:1.8rem">/${total}</span>`;
  document.getElementById('screen-student').style.display='none';
  document.getElementById('view-results').style.display='block';
}

// ── TIMER ──
function startTimer(minutes){
  S.secondsLeft = Math.round(minutes*60);
  updateTimerDisplay();
  S.timerInterval = setInterval(()=>{
    S.secondsLeft--;
    updateTimerDisplay();
    if(S.secondsLeft<=0){ stopTimer(); toast("Time's up — submitting your test",'error'); submitFullTest(); }
  },1000);
}
function stopTimer(){ if(S.timerInterval) clearInterval(S.timerInterval); S.timerInterval=null; }
function updateTimerDisplay(){
  const el=document.getElementById('rft-timer');
  const m=Math.max(0,Math.floor(S.secondsLeft/60)), s=Math.max(0,S.secondsLeft%60);
  el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  el.classList.remove('warn','danger');
  if(S.secondsLeft<=300) el.classList.add('danger');
  else if(S.secondsLeft<=600) el.classList.add('warn');
}

window.addEventListener('load', async ()=>{
  S.student = requireStudentSession();
  if(!S.student) return;
  document.getElementById('nav-student-name').textContent = S.student.name;

  const taskId = qparam('task');
  if(!taskId){ window.location.href='student.html'; return; }

  try{
    const [tasks, subs] = await Promise.all([
      get(`tasks?id=eq.${taskId}`),
      get(`submissions?student_id=eq.${S.student.id}&task_id=eq.${taskId}`)
    ]);
    if(!tasks.length){ document.getElementById('rft-passage-panel').innerHTML='<div class="empty-state"><div class="icon">📭</div><h3>Task not found</h3></div>'; return; }
    S.task = tasks[0];
    S.currentSubmission = subs[0]||null;

    let data={}; try{ data=JSON.parse(S.task.content); }catch(e){ data={passages:[],questions:[]}; }
    S.testData = data;
    document.getElementById('rft-test-title').textContent = S.task.title;

    if(S.currentSubmission){
      try{ S.savedAnswers = JSON.parse(S.currentSubmission.answer||'{}'); }catch(e){ S.savedAnswers={}; }
      document.getElementById('rft-submit-btn').style.display='none';
    } else {
      S.savedAnswers = {};
      startTimer(data.time_limit_minutes||60);
    }
  }catch(e){
    toast(e.message,'error');
    document.getElementById('rft-passage-panel').innerHTML='<div class="empty-state"><div class="icon">⚠</div><h3>Could not load test</h3></div>';
    return;
  }

  // Rendering is wrapped separately from the data fetch above: a problem
  // here (e.g. a malformed question from an imported task) should never
  // erase the passage text that already loaded successfully.
  try{
    renderActivePassage();
  }catch(e){
    console.error('renderActivePassage failed:', e);
    toast('Some questions could not be displayed: '+e.message,'error');
  }
});
</script>
