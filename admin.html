<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IELTS Pro — Admin</title>
<link rel="stylesheet" href="shared.css"/>
</head>
<body>

<!-- LOADING -->
<div id="screen-loading" class="screen active">
  <div class="loader-logo">
    <h1>IELTS <span>Pro</span></h1>
    <div class="spin"></div>
  </div>
</div>

<!-- ADMIN LOGIN -->
<div id="screen-admin-login" class="screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="badge">⚙ Admin</div>
      <h1>Admin <span>Panel</span></h1>
      <p>Enter your admin credentials</p>
    </div>
    <div id="admin-login-error" class="error-msg">Incorrect credentials.</div>
    <div class="form-group"><label>Admin Email</label><input type="email" id="input-admin-user" placeholder="you@example.com"/></div>
    <div class="form-group"><label>Password</label><input type="password" id="input-admin-pass" placeholder="••••••••"/></div>
    <button class="btn btn-primary" onclick="adminLogin()">Enter Admin Panel</button>
    <button class="btn btn-ghost" onclick="window.location.href='index.html'">← Back to Student Login</button>
  </div>
</div>

<!-- ADMIN AREA -->
<div id="screen-admin" class="screen">
  <nav class="app-nav">
    <div class="nav-logo">IELTS <span>Pro</span> <span style="color:rgba(255,255,255,0.4);font-size:11px;margin-left:8px;">Admin</span></div>
    <div class="nav-right"><button class="btn-nav-logout" onclick="adminLogout()">Logout</button></div>
  </nav>
  <div class="content">
    <div class="admin-stats-row" id="admin-stats"></div>
    <div class="admin-grid">
      <div class="admin-sidebar">
        <div class="sidebar-header">Navigation</div>
        <div class="sidebar-item active" onclick="adminNav('groups',this)">👥 Groups</div>
        <div class="sidebar-item" onclick="adminNav('students',this)">🎓 Students</div>
        <div class="sidebar-item" onclick="adminNav('lessons',this)">📋 Lessons</div>
        <div class="sidebar-item" onclick="adminNav('tasks',this)">📝 Tasks</div>
        <div class="sidebar-item" onclick="adminNav('submissions',this)">✉ Submissions</div>
      </div>
      <div class="admin-main">
        <div id="admin-groups" class="admin-section active">
          <div class="section-header"><div class="section-title">Groups</div><button class="btn btn-primary btn-sm" onclick="openModal('group')">+ Add Group</button></div>
          <div id="groups-table"></div>
        </div>
        <div id="admin-students" class="admin-section">
          <div class="section-header"><div class="section-title">Students</div><button class="btn btn-primary btn-sm" onclick="openModal('student')">+ Add Student</button></div>
          <div id="students-table"></div>
        </div>
        <div id="admin-lessons" class="admin-section">
          <div class="section-header"><div class="section-title">Lessons</div><button class="btn btn-primary btn-sm" onclick="openModal('lesson')">+ Add Lesson</button></div>
          <div id="lessons-table"></div>
        </div>
        <div id="admin-tasks" class="admin-section">
          <div class="section-header"><div class="section-title">Tasks</div><button class="btn btn-primary btn-sm" onclick="openModal('task')">+ Add Task</button></div>
          <div id="tasks-table"></div>
        </div>
        <div id="admin-submissions" class="admin-section">
          <div class="section-header"><div class="section-title">Writing Submissions</div></div>
          <div id="submissions-table"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal"><h2 id="modal-title"></h2><div id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-outline btn-sm" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary btn-sm" onclick="saveModal()">Save</button>
    </div>
  </div>
</div>

<!-- SUBMISSION REVIEW MODAL -->
<div class="modal-overlay" id="sub-modal-overlay" onclick="if(event.target===this)closeSubModal()">
  <div class="modal" style="max-width:640px">
    <h2 id="sub-modal-title">Review Submission</h2>
    <div id="sub-modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-outline btn-sm" onclick="closeSubModal()">Close</button>
      <button class="btn btn-success btn-sm" id="sub-save-btn" onclick="saveScore()">Save Feedback</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="shared.js"></script>
<script>
function showScreen(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

let S = {
  groups: [], students: [], adminLessons: [], adminTasks: [], adminSubs: [],
  modalType: null, editId: null, currentSubId: null, subsFilter: 'all'
};

function adminLogout(){ clearAdminSession(); showScreen('screen-admin-login'); }

// ── AUTH ──
async function adminLogin() {
  const email=document.getElementById('input-admin-user').value.trim();
  const pass=document.getElementById('input-admin-pass').value.trim();
  const errEl=document.getElementById('admin-login-error');
  try {
    const data = await authApi('token?grant_type=password', { email, password: pass });
    ADMIN_TOKEN = data.access_token;
    sessionStorage.setItem('admin_token', data.access_token);
    sessionStorage.setItem('admin_refresh', data.refresh_token);
    errEl.classList.remove('show');
    showScreen('screen-admin');
    loadAdminData();
  } catch(e){ errEl.textContent = 'Incorrect email or password.'; errEl.classList.add('show'); }
}

// ── ADMIN ──
async function loadAdminData() {
  // Each section loads independently — a broken/unexpected schema on one
  // table (e.g. submissions) should never block the others from showing,
  // and should never be confused with an actual login/session failure.
  const results = await Promise.allSettled([
    get('groups?order=name.asc'),
    get('students?select=*,groups(name)&order=name.asc'),
    get('lessons?order=order.asc'),
    get('tasks?order=order.asc'),
    get('submissions?select=*,students(name,student_code),tasks(title,skill,lessons(title))&order=submitted_at.desc')
  ]);

  const [groupsR, studentsR, lessonsR, tasksR, subsR] = results;
  const isAuthError = (r) => r.status==='rejected' && /401|403|jwt|auth/i.test(r.reason?.message||'');

  // Only bounce back to login if the lessons/groups query itself failed
  // for an auth reason — i.e. we're not really logged in / token expired.
  if (groupsR.status==='rejected' && isAuthError(groupsR)) {
    toast('Session expired — please log in again','error');
    clearAdminSession();
    showScreen('screen-admin-login');
    return;
  }

  S.groups = groupsR.status==='fulfilled' ? groupsR.value : [];
  S.students = studentsR.status==='fulfilled' ? studentsR.value : [];
  S.adminLessons = lessonsR.status==='fulfilled' ? lessonsR.value : [];
  S.adminTasks = tasksR.status==='fulfilled' ? tasksR.value : [];
  S.adminSubs = subsR.status==='fulfilled' ? subsR.value : [];

  // Surface any individual failures so they're visible instead of silent —
  // but only once per load, and without logging the admin out for them.
  results.forEach((r,i) => {
    if (r.status==='rejected') {
      const labels=['groups','students','lessons','tasks','submissions'];
      console.error(`Failed to load ${labels[i]}:`, r.reason?.message);
      toast(`Couldn't load ${labels[i]}: ${r.reason?.message||'unknown error'}`,'error');
    }
  });

  renderAdminStats(); renderGroupsTable(); renderStudentsTable(); renderLessonsTable(); renderTasksTable(); renderSubmissionsTable();
}

function renderAdminStats(){
  document.getElementById('admin-stats').innerHTML=`
    <div class="admin-stat"><div class="label">Groups</div><div class="value">${S.groups.length}</div></div>
    <div class="admin-stat"><div class="label">Students</div><div class="value">${S.students.length}</div></div>
    <div class="admin-stat"><div class="label">Lessons</div><div class="value">${S.adminLessons.length}</div></div>
    <div class="admin-stat"><div class="label">Submissions</div><div class="value">${S.adminSubs.length}</div></div>`;
}

function renderGroupsTable(){
  const el=document.getElementById('groups-table');
  if(!S.groups.length){el.innerHTML='<div class="empty-state"><div class="icon">👥</div><h3>No groups yet</h3></div>';return;}
  el.innerHTML=`<div class="data-table"><table><tr><th>Group Name</th><th>Students</th><th>Actions</th></tr>
    ${S.groups.map(g=>`<tr><td><strong>${g.name}</strong></td><td>${S.students.filter(s=>s.group_id===g.id).length}</td>
    <td><button class="btn btn-outline btn-sm" onclick="openModal('group','${g.id}')">Edit</button>
    <button class="btn btn-danger btn-sm" style="margin-left:6px" onclick="deleteItem('groups','${g.id}')">Delete</button></td></tr>`).join('')}
  </table></div>`;
}

function renderStudentsTable(){
  const el=document.getElementById('students-table');
  if(!S.students.length){el.innerHTML='<div class="empty-state"><div class="icon">🎓</div><h3>No students yet</h3></div>';return;}
  el.innerHTML=`<div class="data-table"><table><tr><th>Name</th><th>Student ID</th><th>Group</th><th>Actions</th></tr>
    ${S.students.map(s=>`<tr><td><strong>${s.name}</strong></td><td><code>${s.student_code}</code></td><td>${s.groups?.name||'—'}</td>
    <td><button class="btn btn-outline btn-sm" onclick="openModal('student','${s.id}')">Edit</button>
    <button class="btn btn-danger btn-sm" style="margin-left:6px" onclick="deleteItem('students','${s.id}')">Delete</button></td></tr>`).join('')}
  </table></div>`;
}

function renderLessonsTable(){
  const el=document.getElementById('lessons-table');
  if(!S.adminLessons.length){el.innerHTML='<div class="empty-state"><div class="icon">📋</div><h3>No lessons yet</h3></div>';return;}
  el.innerHTML=`<div class="data-table"><table><tr><th>Lesson</th><th>Description</th><th>Order</th><th>Status</th><th>Actions</th></tr>
    ${S.adminLessons.map(l=>`<tr><td><strong>${l.title}</strong></td><td style="color:var(--muted);font-size:13px">${l.description||''}</td><td>${l.order}</td>
    <td><span class="skill-pill" style="background:${l.published?'#dcfce7':'#fef3c7'};color:${l.published?'#15803d':'#b45309'}">${l.published?'Published':'Draft'}</span></td>
    <td><button class="btn btn-outline btn-sm" onclick="openModal('lesson','${l.id}')">Edit</button>
    <button class="btn btn-danger btn-sm" style="margin-left:6px" onclick="deleteItem('lessons','${l.id}')">Delete</button></td></tr>`).join('')}
  </table></div>`;
}

function renderTasksTable(){
  const el=document.getElementById('tasks-table');
  if(!S.adminTasks.length){el.innerHTML='<div class="empty-state"><div class="icon">📝</div><h3>No tasks yet</h3></div>';return;}
  // Group by lesson so up/down reordering moves a task within its own lesson, in order.
  const byLesson = {};
  S.adminTasks.slice().sort((a,b)=>(a.order||0)-(b.order||0)).forEach(t=>{ (byLesson[t.lesson_id]=byLesson[t.lesson_id]||[]).push(t); });

  el.innerHTML=`<div class="data-table"><table><tr><th>Title</th><th>Lesson</th><th>Skill</th><th>Type</th><th>Reorder</th><th>Actions</th></tr>
    ${S.adminTasks.map(t=>{
      const l=S.adminLessons.find(l=>l.id===t.lesson_id);
      const siblings=byLesson[t.lesson_id]||[];
      const idx=siblings.findIndex(s=>s.id===t.id);
      const upId = idx>0 ? siblings[idx-1].id : null;
      const downId = idx<siblings.length-1 ? siblings[idx+1].id : null;
      return `<tr><td><strong>${t.title}</strong></td><td style="font-size:13px;color:var(--muted)">${l?.title||'?'}</td>
      <td><span class="skill-pill pill-${t.skill}">${t.skill}</span></td>
      <td style="font-size:13px">${t.task_type||'—'}</td>
      <td>
        <button class="btn btn-outline btn-sm" ${upId?'':'disabled style="opacity:.3"'} onclick="moveTask('${t.id}','${upId}')" title="Move up">↑</button>
        <button class="btn btn-outline btn-sm" ${downId?'':'disabled style="opacity:.3"'} onclick="moveTask('${downId}','${t.id}')" title="Move down">↓</button>
      </td>
      <td><button class="btn btn-outline btn-sm" onclick="openModal('task','${t.id}')">Edit</button>
      <button class="btn btn-danger btn-sm" style="margin-left:6px" onclick="deleteItem('tasks','${t.id}')">Delete</button></td></tr>`;
    }).join('')}
  </table></div>`;
}

// Swap the "order" values of two tasks (a moves up, b moves down) within the same lesson.
async function moveTask(idA, idB){
  if(!idA||!idB) return;
  const a=S.adminTasks.find(t=>t.id===idA), b=S.adminTasks.find(t=>t.id===idB);
  if(!a||!b) return;
  try{
    await Promise.all([
      patch(`tasks?id=eq.${a.id}`,{order:b.order}),
      patch(`tasks?id=eq.${b.id}`,{order:a.order})
    ]);
    loadAdminData();
  } catch(e){ toast(e.message,'error'); }
}

function renderSubmissionsTable(){
  const filter = S.subsFilter || 'all';
  const allSubs = S.adminSubs||[];
  const subs = filter==='all' ? allSubs : allSubs.filter(s=>s.tasks?.skill===filter);
  const el=document.getElementById('submissions-table');

  const tabs = ['all','reading','listening','writing'].map(f=>
    `<button class="btn ${filter===f?'btn-primary':'btn-outline'} btn-sm" onclick="setSubsFilter('${f}')">${f==='all'?'All':f[0].toUpperCase()+f.slice(1)}</button>`
  ).join(' ');

  if(!subs.length){
    el.innerHTML=`<div style="margin-bottom:14px">${tabs}</div><div class="empty-state"><div class="icon">✉</div><h3>No ${filter==='all'?'':filter+' '}submissions yet</h3></div>`;
    return;
  }

  el.innerHTML=`<div style="margin-bottom:14px">${tabs}</div><div class="data-table"><table><tr><th>Student</th><th>Skill</th><th>Task</th><th>Submitted</th><th>Score</th><th>Actions</th></tr>
    ${subs.map(s=>{
      const skill = s.tasks?.skill||'?';
      let scoreCell;
      if(skill==='reading'||skill==='listening'){
        scoreCell = (s.score!==null&&s.score!==undefined&&s.total!==null&&s.total!==undefined)
          ? `<span class="score-badge" style="background:var(--green)">${s.score}/${s.total}</span>`
          : '<span style="color:var(--muted)">—</span>';
      } else {
        scoreCell = (s.score!==null&&s.score!==undefined) ? `<span class="score-badge">Band ${s.score}</span>` : '<span style="color:var(--muted)">—</span>';
      }
      return `<tr>
        <td><strong>${s.students?.name||'?'}</strong><br><small style="color:var(--muted)">${s.students?.student_code||''}</small></td>
        <td><span class="skill-pill pill-${skill}">${skill}</span></td>
        <td>${s.tasks?.title||'?'}<br><small style="color:var(--muted)">${s.tasks?.lessons?.title||''}</small></td>
        <td style="font-size:13px">${new Date(s.submitted_at).toLocaleDateString()}</td>
        <td>${scoreCell}</td>
        <td><button class="btn btn-outline btn-sm" onclick="openSubmission('${s.id}')">${skill==='writing'?'Review':'View'}</button></td>
      </tr>`;
    }).join('')}
  </table></div>`;
}

function setSubsFilter(f){ S.subsFilter=f; renderSubmissionsTable(); }

function adminNav(section,el){ document.querySelectorAll('.sidebar-item').forEach(i=>i.classList.remove('active')); el.classList.add('active'); document.querySelectorAll('.admin-section').forEach(s=>s.classList.remove('active')); document.getElementById(`admin-${section}`).classList.add('active'); }

// ── MODAL ──
// ── TASK MODAL: skill-specific fields ──
// Reading: rich-text passage + native question builder (gap_fill/tfng/mcq/matching/short_answer).
// Listening: audio upload + the same question builder (minus TFNG).
// Writing: prompt/instructions + optional image, min word count, time limit.
// Vocabulary (or anything else): falls back to the raw JSON editor.
function onTaskSkillChange(){
  const skill=document.getElementById('m-skill').value;
  const t=S.editId?S.adminTasks.find(x=>x.id===S.editId):null;
  renderTaskSkillFields(skill, skill===t?.skill?t:null);
}

// In-memory question list while the task modal is open. Mirrors the
// {type, question, options, answer} shape the existing student-side
// grading engine (in reading-test.html / listening-test.html) expects.
let TASK_QUESTIONS = [];
let TASK_QUESTIONS_SKILL = 'reading';

// ── FULL READING TEST (multiple passages) ──
// TASK_PASSAGES holds one entry per passage: {title, passage_html, questions}.
// In single-passage mode it always has exactly one entry — TASK_FULLTEST just
// controls whether tabs are shown and which task_type/content shape gets saved.
// TASK_QUESTIONS always points at TASK_PASSAGES[ACTIVE_PASSAGE].questions (the
// same array reference), so the existing question-builder code below needs no
// changes at all — it keeps mutating "the active passage's questions".
let TASK_PASSAGES = [];
let TASK_FULLTEST = false;
let ACTIVE_PASSAGE = 0;

function renderTaskSkillFields(skill, t){
  const el=document.getElementById('task-skill-fields');
  let data={}; if(t) try{data=JSON.parse(t.content||'{}');}catch(e){}
  TASK_QUESTIONS = (t && skill===t.skill) ? (data.questions||[]).map(q=>({...q})) : [];

  if(skill==='reading'){
    TASK_FULLTEST = !!(t && skill===t.skill && t.task_type==='reading_full_test');
    if(TASK_FULLTEST){
      TASK_PASSAGES = (data.passages||[]).map((p,pi)=>({
        title: p.title || ('Passage '+(pi+1)),
        passage_html: p.passage_html || '<p></p>',
        questions: (p.questions||[]).map(q=>({...q}))
      }));
      if(!TASK_PASSAGES.length) TASK_PASSAGES=[{title:'Passage 1',passage_html:'<p></p>',questions:[]}];
    } else {
      TASK_PASSAGES = [{ title:'Passage 1', passage_html: data.passage_html || '<p></p>', questions: TASK_QUESTIONS }];
    }
    ACTIVE_PASSAGE = 0;
    TASK_QUESTIONS_SKILL = 'reading';
    renderReadingFields();
  } else if(skill==='listening'){
    el.innerHTML = `
      <div class="form-group">
        <label>🎧 Audio file</label>
        <input type="file" id="m-audiofile" accept="audio/*" onchange="onAudioFileSelected(this)"/>
        <div class="hint-text" id="m-audiofile-status">${data.audio_url?`Currently set: <a href="${data.audio_url}" target="_blank">listen to current audio</a>. Choose a new file to replace it.`:'Upload the listening recording students will hear (mp3, wav, m4a...).'}</div>
        <input type="hidden" id="m-audiourl" value="${data.audio_url||''}"/>
      </div>
      <div class="form-group"><label>Instructions shown above the player (optional)</label>
        <input id="m-instructions" value="${data.instructions||''}" placeholder="e.g. Listen carefully and fill in the gaps below."/>
      </div>
      <div id="question-builder"></div>`;
    TASK_QUESTIONS_SKILL = 'listening';
    renderQuestionBuilder();
  } else if(skill==='writing'){
    el.innerHTML = `
      <div class="form-group">
        <label>🖼️ Image (optional — chart, graph, diagram, map)</label>
        <input type="file" id="m-imagefile" accept="image/*" onchange="onImageFileSelected(this)"/>
        <div class="hint-text" id="m-imagefile-status">${data.image_url?`Currently set: <img src="${data.image_url}" style="max-width:100%;max-height:120px;display:block;margin-top:8px;border-radius:8px"/>`:'Students will see this above the writing prompt — typical for Writing Task 1.'}</div>
        <input type="hidden" id="m-imageurl" value="${data.image_url||''}"/>
      </div>
      <div class="form-group"><label>Instructions / Prompt</label>
        <textarea id="m-prompt" style="min-height:120px">${data.prompt||''}</textarea>
      </div>
      <div class="form-group"><label>Minimum word count</label>
        <input type="number" id="m-minwords" value="${data.min_words||150}"/>
      </div>
      <div class="form-group"><label>Time limit in minutes (optional)</label>
        <input type="number" id="m-timelimit" value="${data.time_limit_minutes||''}"/>
      </div>`;
  } else {
    let contentVal=''; if(t) try{contentVal=JSON.stringify(JSON.parse(t.content),null,2);}catch(e){contentVal=t.content||'';}
    el.innerHTML = `<div class="form-group"><label>Task Type (e.g. gap_fill, tfng, mcq, essay)</label><input id="m-type" value="${t?.task_type||''}"/></div>
      <div class="form-group"><label>Content (JSON)</label>
        <textarea id="m-content" style="min-height:140px;font-family:monospace;font-size:12px">${contentVal}</textarea>
        <div class="hint-text">{"questions":[{"type":"mcq","question":"...","options":["..."],"answer":"A"}]}</div>
      </div>`;
  }
}

// ── READING TASK FIELDS (single passage, or full multi-passage test) ──
function renderReadingFields(){
  const el=document.getElementById('task-skill-fields');
  if(!el) return;
  if(!TASK_PASSAGES.length) TASK_PASSAGES=[{title:'Passage 1',passage_html:'<p></p>',questions:[]}];
  if(ACTIVE_PASSAGE>=TASK_PASSAGES.length) ACTIVE_PASSAGE=TASK_PASSAGES.length-1;
  TASK_QUESTIONS = TASK_PASSAGES[ACTIVE_PASSAGE].questions;

  const tabsHtml = TASK_FULLTEST ? `
    <div class="passage-tabs">
      ${TASK_PASSAGES.map((p,pi)=>`<button type="button" class="btn ${pi===ACTIVE_PASSAGE?'btn-primary':'btn-outline'} btn-sm" onclick="switchPassageTab(${pi})">${(p.title||'Passage '+(pi+1)).replace(/</g,'&lt;')}</button>`).join('')}
      <button type="button" class="btn btn-outline btn-sm" onclick="addPassage()">+ Passage</button>
      ${TASK_PASSAGES.length>1?`<button type="button" class="btn btn-danger btn-sm" onclick="removePassage(${ACTIVE_PASSAGE})">Remove this passage</button>`:''}
    </div>` : '';

  const titleField = TASK_FULLTEST ? `
    <div class="form-group"><label>Passage Title</label>
      <input id="m-passage-title" value="${(TASK_PASSAGES[ACTIVE_PASSAGE].title||'').replace(/"/g,'&quot;')}" oninput="updatePassageTitle(this.value)"/>
    </div>` : '';

  el.innerHTML = `
    <div class="form-group">
      <label style="display:flex;align-items:center;gap:8px;font-weight:600;cursor:pointer">
        <input type="checkbox" ${TASK_FULLTEST?'checked':''} onchange="toggleFullTest(this.checked)" style="width:auto"/>
        Full Reading Test (multiple passages, like a real IELTS test)
      </label>
      <div class="hint-text">Each passage gets its own text and question set. Question numbering and the student timer carry across all passages.</div>
    </div>
    <div class="form-group">
      <button type="button" class="btn btn-outline btn-sm" onclick="toggleImportBox()">⎘ Paste Test JSON</button>
      <div id="import-box" style="display:none;margin-top:8px">
        <textarea id="m-import-json" style="min-height:140px;font-family:monospace;font-size:12px" placeholder='{"passages":[{"title":"Passage 1","passage_html":"<p>...</p>","questions":[{"type":"tfng","question":"...","answer":"True"}]}]}'></textarea>
        <button type="button" class="btn btn-primary btn-sm" style="margin-top:6px" onclick="importReadingJSON()">Import</button>
        <div class="hint-text">A "passages" array replaces the WHOLE test. A plain "passage_html"+"questions" JSON only fills the currently selected tab above — switch tabs and import again to add each passage separately.</div>
      </div>
    </div>

// Pulls the live contenteditable/title DOM values back into TASK_PASSAGES
// before we navigate away from the currently-active passage (tab switch,
// add/remove passage, toggling full-test mode, or saving).
function syncActivePassage(){
  const p = TASK_PASSAGES[ACTIVE_PASSAGE]; if(!p) return;
  const passageEl=document.getElementById('m-passage'); if(passageEl) p.passage_html=passageEl.innerHTML;
  const titleEl=document.getElementById('m-passage-title'); if(titleEl) p.title=titleEl.value;
}
function updatePassageTitle(v){ if(TASK_PASSAGES[ACTIVE_PASSAGE]) TASK_PASSAGES[ACTIVE_PASSAGE].title=v; }

function switchPassageTab(idx){ syncActivePassage(); ACTIVE_PASSAGE=idx; renderReadingFields(); }

function addPassage(){
  syncActivePassage();
  TASK_PASSAGES.push({ title:'Passage '+(TASK_PASSAGES.length+1), passage_html:'<p></p>', questions:[] });
  ACTIVE_PASSAGE = TASK_PASSAGES.length-1;
  renderReadingFields();
}

function removePassage(idx){
  if(TASK_PASSAGES.length<=1) return toast('A full test needs at least one passage','error');
  if(!confirm('Remove this passage and all of its questions?')) return;
  TASK_PASSAGES.splice(idx,1);
  ACTIVE_PASSAGE = Math.min(ACTIVE_PASSAGE, TASK_PASSAGES.length-1);
  renderReadingFields();
}

function toggleImportBox(){
  const b=document.getElementById('import-box');
  if(b) b.style.display = (b.style.display==='none'||!b.style.display) ? 'block' : 'none';
}

// Lets you paste a JSON blob (e.g. generated by Claude from raw passage
// text + an answer key) instead of building a test through the UI.
// Accepts either {passages:[{title,passage_html,questions}, ...]} for a
// full test, or {passage_html, questions} for a single passage.
function importReadingJSON(){
  const raw = document.getElementById('m-import-json').value.trim();
  if(!raw) return toast('Paste some JSON first','error');
  let parsed;
  try{ parsed = JSON.parse(raw); } catch(e){ return toast('Invalid JSON: '+e.message,'error'); }

  if(Array.isArray(parsed.passages) && parsed.passages.length){
    TASK_FULLTEST = true;
    TASK_PASSAGES = parsed.passages.map((p,pi)=>({
      title: p.title || ('Passage '+(pi+1)),
      passage_html: p.passage_html || '<p></p>',
      questions: (p.questions||[]).map(q=>({...q}))
    }));
  } else if(Array.isArray(parsed.questions)){
    // Single-passage JSON: fill ONLY the currently active tab, leaving any
    // other passages untouched. This lets you import Passage 1, switch to
    // the Passage 2 tab, import Passage 2's JSON separately, etc.
    if(!TASK_PASSAGES.length) TASK_PASSAGES=[{title:'Passage 1',passage_html:'<p></p>',questions:[]}];
    const target = TASK_PASSAGES[ACTIVE_PASSAGE];
    target.passage_html = parsed.passage_html || target.passage_html || '<p></p>';
    target.questions = parsed.questions.map(q=>({...q}));
    if(parsed.title) target.title = parsed.title;
  } else {
    return toast('JSON must contain a "passages" array (full test) or a "questions" array (single passage)','error');
  }
  renderReadingFields();
  toast('Imported into "'+(TASK_PASSAGES[ACTIVE_PASSAGE].title||'this passage')+'" — review it below, then hit Save','success');
}

// Switching the "Full Reading Test" checkbox. Turning it on just wraps the
// current single passage as Passage 1 of a test. Turning it off (when there
// are multiple passages) discards the others after confirmation.
function toggleFullTest(on){
  syncActivePassage();
  if(!on && TASK_PASSAGES.length>1){
    if(!confirm('Switching back to a single passage will discard the OTHER passages and their questions (the one you\'re currently viewing is kept). Continue?')){
      renderReadingFields(); // re-render to restore the checkbox to its previous (checked) state
      return;
    }
    TASK_PASSAGES = [TASK_PASSAGES[ACTIVE_PASSAGE]];
    ACTIVE_PASSAGE = 0;
  }
  TASK_FULLTEST = on;
  renderReadingFields();
}

function questionEditorHtml(q, qi){
  const typeLabel = {gap_fill:'Gap Fill',tfng:'True/False/NG',ynng:'Yes/No/NG',mcq:'Multiple Choice',matching:'Matching Features',short_answer:'Short Answer',sentence_endings:'Sentence Endings',summary_completion:'Summary Completion',note_completion:'Note Completion',table_completion:'Table Completion',flow_chart:'Flow-Chart',diagram_label:'Diagram Label'}[q.type]||q.type;
  const common = `<div class="q-builder-item" style="border:1.5px solid var(--border);border-radius:10px;padding:12px;margin-bottom:10px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span class="skill-pill">${typeLabel}</span>
      <button type="button" class="btn btn-danger btn-sm" onclick="removeQuestion(${qi})">Remove</button>
    </div>
    <input placeholder="Question / instruction text" value="${(q.question||'').replace(/"/g,'&quot;')}" oninput="updateQuestion(${qi},'question',this.value)" style="margin-bottom:8px"/>`;

  if(q.type==='gap_fill' || q.type==='short_answer'){
    return common + `<input placeholder="Correct answer" value="${(q.answer||'').replace(/"/g,'&quot;')}" oninput="updateQuestion(${qi},'answer',this.value)"/></div>`;
  }
  if(q.type==='tfng'){
    return common + `<select onchange="updateQuestion(${qi},'answer',this.value)">
      ${['True','False','Not Given'].map(o=>`<option value="${o}" ${q.answer===o?'selected':''}>${o}</option>`).join('')}
    </select></div>`;
  }
  if(q.type==='ynng'){
    return common + `<select onchange="updateQuestion(${qi},'answer',this.value)">
      ${['Yes','No','Not Given'].map(o=>`<option value="${o}" ${q.answer===o?'selected':''}>${o}</option>`).join('')}
    </select></div>`;
  }
  if(q.type==='mcq'){
    const defaultCount = TASK_QUESTIONS_SKILL==='listening' ? 3 : 4;
    const opts = q.options && q.options.length ? q.options : Array(defaultCount).fill('');
    return common + opts.map((o,oi)=>{
      const letter=String.fromCharCode(65+oi);
      return `<div style="display:flex;gap:8px;align-items:center;margin-bottom:6px">
        <input type="radio" name="mcq-answer-${qi}" ${q.answer===letter?'checked':''} onchange="updateQuestion(${qi},'answer','${letter}')" style="width:auto"/>
        <span style="font-weight:600;width:18px">${letter}</span>
        <input placeholder="Option ${letter}" value="${(o||'').replace(/"/g,'&quot;')}" oninput="updateOption(${qi},${oi},this.value)" style="flex:1"/>
      </div>`;
    }).join('') + `</div>`;
  }
  if(q.type==='matching' || q.type==='sentence_endings'){
    const items = q.items && q.items.length ? q.items : [{label:'',answer:''}];
    const matchOptions = q.matchOptions && q.matchOptions.length ? q.matchOptions : ['',''];
    const isSentEndings = q.type==='sentence_endings';
    return common + `
      <div class="hint-text" style="margin-bottom:6px">${isSentEndings?'Sentence endings (A, B, C…):':'Option pool students choose from:'}</div>
      ${matchOptions.map((o,oi)=>`<div style="display:flex;gap:8px;align-items:center;margin-bottom:6px">
        <span style="font-weight:600;width:22px">${isSentEndings?String.fromCharCode(65+oi):oi+1+'.'}</span>
        <input placeholder="Option text" value="${(o||'').replace(/"/g,'&quot;')}" oninput="updateMatchOption(${qi},${oi},this.value)" style="flex:1"/>
        <button type="button" class="btn btn-danger btn-sm" onclick="removeMatchOption(${qi},${oi})">✕</button>
      </div>`).join('')}
      <button type="button" class="btn btn-outline btn-sm" onclick="addMatchOption(${qi})" style="margin-bottom:10px">+ Option</button>
      <div class="hint-text" style="margin-bottom:6px">${isSentEndings?'Sentence beginnings (students pick the matching ending):':'Items to match, with their correct option:'}</div>
      ${items.map((it,ii)=>`<div style="display:flex;gap:8px;align-items:center;margin-bottom:6px;flex-wrap:wrap">
        <input placeholder="${isSentEndings?'Sentence beginning…':'Item (e.g. Paragraph A)'}" value="${(it.label||'').replace(/"/g,'&quot;')}" oninput="updateMatchItem(${qi},${ii},'label',this.value)" style="flex:1;min-width:120px"/>
        <select onchange="updateMatchItem(${qi},${ii},'answer',this.value)" style="min-width:80px">
          <option value="">Correct…</option>
          ${matchOptions.map((o,oi)=>{ const key=isSentEndings?String.fromCharCode(65+oi):o; return `<option value="${key.replace(/"/g,'&quot;')}" ${it.answer===key?'selected':''}>${isSentEndings?String.fromCharCode(65+oi):o||'(empty)'}</option>`; }).join('')}
        </select>
        <button type="button" class="btn btn-danger btn-sm" onclick="removeMatchItem(${qi},${ii})">✕</button>
      </div>`).join('')}
      <button type="button" class="btn btn-outline btn-sm" onclick="addMatchItem(${qi})">+ Item</button>
    </div>`;
  }
  if(q.type==='summary_completion'||q.type==='note_completion'||q.type==='table_completion'||q.type==='flow_chart'){
    const items = q.items && q.items.length ? q.items : [{answer:''}];
    const typeHint = {summary_completion:'Use {1}, {2}, {3}… in the context text to mark gaps.',note_completion:'Use {1}, {2}… to mark blank spaces in your notes.',table_completion:'Use {1}, {2}… to mark blank cells.',flow_chart:'Use {1}, {2}… to mark blank steps.'}[q.type]||'Use {N} placeholders for gaps.';
    return common + `
      <div class="hint-text" style="margin-bottom:6px">${typeHint}</div>
      <textarea placeholder="Context text with {1} {2} {3} placeholders…" oninput="updateQuestion(${qi},'context',this.value)" style="min-height:100px;font-size:13px">${(q.context||'').replace(/</g,'&lt;')}</textarea>
      <div class="hint-text" style="margin:8px 0 6px">Correct answers for each gap (in order):</div>
      ${items.map((it,ii)=>`<div style="display:flex;gap:8px;align-items:center;margin-bottom:6px">
        <span style="font-weight:600;min-width:28px">{${ii+1}}</span>
        <input placeholder="Answer" value="${(it.answer||'').replace(/"/g,'&quot;')}" oninput="updateGapItem(${qi},${ii},this.value)" style="flex:1"/>
        <button type="button" class="btn btn-danger btn-sm" onclick="removeGapItem(${qi},${ii})">✕</button>
      </div>`).join('')}
      <button type="button" class="btn btn-outline btn-sm" onclick="addGapItem(${qi})">+ Gap</button>
    </div>`;
  }
  if(q.type==='diagram_label'){
    const items = q.items && q.items.length ? q.items : [{label:'1',answer:''}];
    return common + `
      <div class="form-group" style="margin-bottom:8px"><input placeholder="Image URL for diagram (optional)" value="${(q.image_url||'').replace(/"/g,'&quot;')}" oninput="updateQuestion(${qi},'image_url',this.value)"/></div>
      <div class="hint-text" style="margin-bottom:6px">Label numbers and their correct answers:</div>
      ${items.map((it,ii)=>`<div style="display:flex;gap:8px;align-items:center;margin-bottom:6px">
        <input placeholder="Label (e.g. A, 1, 2)" value="${(it.label||'').replace(/"/g,'&quot;')}" oninput="updateMatchItem(${qi},${ii},'label',this.value)" style="width:80px"/>
        <input placeholder="Answer" value="${(it.answer||'').replace(/"/g,'&quot;')}" oninput="updateMatchItem(${qi},${ii},'answer',this.value)" style="flex:1"/>
        <button type="button" class="btn btn-danger btn-sm" onclick="removeMatchItem(${qi},${ii})">✕</button>
      </div>`).join('')}
      <button type="button" class="btn btn-outline btn-sm" onclick="addMatchItem(${qi})">+ Label</button>
    </div>`;
  }
  return common + `</div>`;
}

function addMatchItem(qi){ TASK_QUESTIONS[qi].items=TASK_QUESTIONS[qi].items||[]; TASK_QUESTIONS[qi].items.push({label:'',answer:''}); renderQuestionBuilder(); }
function removeMatchItem(qi,ii){ TASK_QUESTIONS[qi].items.splice(ii,1); renderQuestionBuilder(); }
function updateMatchItem(qi,ii,field,value){ TASK_QUESTIONS[qi].items[ii][field]=value; if(field!=='answer') renderQuestionBuilder(); }
function addMatchOption(qi){ TASK_QUESTIONS[qi].matchOptions=TASK_QUESTIONS[qi].matchOptions||[]; TASK_QUESTIONS[qi].matchOptions.push(''); renderQuestionBuilder(); }
function removeMatchOption(qi,oi){ TASK_QUESTIONS[qi].matchOptions.splice(oi,1); renderQuestionBuilder(); }
function updateMatchOption(qi,oi,value){ TASK_QUESTIONS[qi].matchOptions[oi]=value; }
function addGapItem(qi){ TASK_QUESTIONS[qi].items=TASK_QUESTIONS[qi].items||[]; TASK_QUESTIONS[qi].items.push({answer:''}); renderQuestionBuilder(); }
function removeGapItem(qi,ii){ TASK_QUESTIONS[qi].items.splice(ii,1); renderQuestionBuilder(); }
function updateGapItem(qi,ii,value){ if(!TASK_QUESTIONS[qi].items) TASK_QUESTIONS[qi].items=[]; if(!TASK_QUESTIONS[qi].items[ii]) TASK_QUESTIONS[qi].items[ii]={answer:''}; TASK_QUESTIONS[qi].items[ii].answer=value; }

// Validates the in-progress question list before save. Returns an error
// message string if something's wrong, or null if everything checks out.
function validateQuestions(questions){
  for(const q of questions){
    if(!q.question.trim()) return 'Every question needs question text';
    if(q.type==='mcq'){
      if(q.options.some(o=>!o.trim())) return 'Fill in all multiple-choice options';
      if(!q.answer) return 'Pick the correct option for every multiple-choice question';
    } else if(q.type==='matching'||q.type==='sentence_endings'){
      if(!q.matchOptions || q.matchOptions.some(o=>!o.trim())) return 'Fill in all options (the pool students choose from)';
      if(!q.items || q.items.length===0) return 'Add at least one item to match';
      for(const it of q.items){
        if(q.type==='matching' && !it.label.trim()) return 'Every matching item needs a label';
        if(!it.answer) return 'Every item needs a correct option selected';
      }
    } else if(q.type==='diagram_label'){
      if(!q.items || q.items.length===0) return 'Add at least one label';
      for(const it of q.items){ if(!it.answer.trim()) return 'Every diagram label needs a correct answer'; }
    } else if(q.type==='summary_completion'||q.type==='note_completion'||q.type==='table_completion'||q.type==='flow_chart'){
      if(!q.context||!q.context.trim()) return `${q.type.replace('_',' ')} question needs context text with {1}, {2}… placeholders`;
      if(!q.items || q.items.length===0) return 'Add at least one gap answer';
      for(const it of q.items){ if(!it.answer.trim()) return 'Fill in the answer for every gap'; }
    } else {
      // gap_fill, tfng, ynng, short_answer — all use a single top-level answer
      if(!q.answer || !String(q.answer).trim()) return 'Every question needs a correct answer set';
    }
  }
  return null;
}

function addQuestion(type){
  const base = {type, question:'', answer:''};
  if(type==='mcq') base.options = Array(TASK_QUESTIONS_SKILL==='listening'?3:4).fill('');
  if(type==='matching'||type==='sentence_endings'){ base.items=[{label:'',answer:''}]; base.matchOptions=['','']; delete base.answer; }
  if(type==='diagram_label'){ base.items=[{label:'1',answer:''}]; base.image_url=''; delete base.answer; }
  if(type==='summary_completion'||type==='note_completion'||type==='table_completion'||type==='flow_chart'){ base.items=[{answer:''}]; base.context=''; delete base.answer; }
  if(type==='ynng') base.answer='Yes';
  TASK_QUESTIONS.push(base);
  renderQuestionBuilder();
}
function removeQuestion(qi){ TASK_QUESTIONS.splice(qi,1); renderQuestionBuilder(); }
function updateQuestion(qi, field, value){ TASK_QUESTIONS[qi][field]=value; }
function updateOption(qi, oi, value){ TASK_QUESTIONS[qi].options[oi]=value; }

// Reads a locally-selected audio/image file and uploads it to Supabase
// Storage (audio/image files are NOT subject to the .html text/plain
// restriction — that only applies to text/html content — so Storage
// works normally here).
async function uploadMediaFile(file, folder){
  if(!ADMIN_TOKEN) throw new Error('Not authenticated as admin');
  const path = `${folder}/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9_.-]/g,'_')}`;
  const r = await fetch(`${SUPA_URL}/storage/v1/object/task-media/${path}`, {
    method:'POST',
    headers:{ apikey:SUPA_KEY, Authorization:`Bearer ${ADMIN_TOKEN}`, 'Content-Type':file.type||'application/octet-stream', 'x-upsert':'true' },
    body:file
  });
  if(!r.ok){ let msg='Upload failed'; try{const e=await r.json(); msg=e.message||msg;}catch(_){} throw new Error(msg); }
  return `${SUPA_URL}/storage/v1/object/public/task-media/${path}`;
}

async function onAudioFileSelected(input){
  const file=input.files&&input.files[0]; if(!file) return;
  const statusEl=document.getElementById('m-audiofile-status');
  statusEl.textContent='Uploading…';
  try{
    const url=await uploadMediaFile(file,'audio');
    document.getElementById('m-audiourl').value=url;
    statusEl.innerHTML=`Uploaded "${file.name}". <audio controls src="${url}" style="display:block;margin-top:6px;max-width:100%"></audio>`;
  }catch(e){ statusEl.textContent='Upload failed: '+e.message; }
}

async function onImageFileSelected(input){
  const file=input.files&&input.files[0]; if(!file) return;
  const statusEl=document.getElementById('m-imagefile-status');
  statusEl.textContent='Uploading…';
  try{
    const url=await uploadMediaFile(file,'images');
    document.getElementById('m-imageurl').value=url;
    statusEl.innerHTML=`Uploaded "${file.name}". <img src="${url}" style="max-width:100%;max-height:120px;display:block;margin-top:8px;border-radius:8px"/>`;
  }catch(e){ statusEl.textContent='Upload failed: '+e.message; }
}

    title.textContent=editId?'Edit Task':'Add Task';
    const skill = t?.skill || 'reading';
    body.innerHTML=`<div class="form-group"><label>Title</label><input id="m-title" value="${t?.title||''}"/></div>
      <div class="form-group"><label>Lesson</label><select id="m-lesson">${lOpts}</select></div>
      <div class="form-group"><label>Skill</label><select id="m-skill" onchange="onTaskSkillChange()">
        ${['reading','listening','writing','vocabulary'].map(sk=>`<option value="${sk}" ${skill===sk?'selected':''}>${sk}</option>`).join('')}
      </select></div>
      <div id="task-skill-fields"></div>
      <div class="form-group"><label>Order</label><input type="number" id="m-order" value="${t?.order||1}"/></div>`;
    renderTaskSkillFields(skill, t);
  }
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(){ document.getElementById('modal-overlay').classList.remove('open'); }
function closeModalOutside(e){ if(e.target===document.getElementById('modal-overlay')) closeModal(); }

async function saveModal(){
  const type=S.modalType;
  try{
    let result;
    if(type==='group'){
      const name=document.getElementById('m-name').value.trim(); if(!name) return toast('Enter group name','error');
      result = S.editId ? await patch(`groups?id=eq.${S.editId}`,{name}) : await post('groups',{name});
    } else if(type==='student'){
      const name=document.getElementById('m-name').value.trim(), code=document.getElementById('m-code').value.trim(), group_id=document.getElementById('m-group').value||null;
      if(!name||!code) return toast('Name and ID required','error');
      result = S.editId ? await patch(`students?id=eq.${S.editId}`,{name,student_code:code,group_id}) : await post('students',{name,student_code:code,group_id});
    } else if(type==='lesson'){
      const title=document.getElementById('m-title').value.trim(), desc=document.getElementById('m-desc').value.trim(), order=parseInt(document.getElementById('m-order').value)||1;
      const published=document.getElementById('m-published').checked;
      const skill=document.getElementById('m-lesson-skill').value;
      if(!title) return toast('Title required','error');
      result = S.editId ? await patch(`lessons?id=eq.${S.editId}`,{title,description:desc,order,published,skill}) : await post('lessons',{title,description:desc,order,published,skill});
    } else if(type==='task'){
      const title=document.getElementById('m-title').value.trim(), lesson_id=document.getElementById('m-lesson').value, skill=document.getElementById('m-skill').value;
      const order=parseInt(document.getElementById('m-order').value)||1;
      if(!title||!lesson_id) return toast('Title and lesson required','error');

      let payload = { title, lesson_id, skill, order };

      if(skill==='reading'){
        syncActivePassage();
        if(TASK_FULLTEST){
          if(!TASK_PASSAGES.length) return toast('Add at least one passage','error');
          for(let pi=0; pi<TASK_PASSAGES.length; pi++){
            const p = TASK_PASSAGES[pi];
            const label = p.title || ('Passage '+(pi+1));
            if(!p.questions || p.questions.length===0) return toast(`${label} needs at least one question`,'error');
            const err = validateQuestions(p.questions);
            if(err) return toast(`${label}: ${err}`,'error');
          }
          payload.task_type='reading_full_test';
          payload.content=JSON.stringify({ passages: TASK_PASSAGES.map(p=>({ title:p.title, passage_html:p.passage_html, questions:p.questions })) });
        } else {
          const passage_html = TASK_PASSAGES[0].passage_html;
          const questions = TASK_PASSAGES[0].questions;
          if(questions.length===0) return toast('Add at least one question','error');
          const err = validateQuestions(questions);
          if(err) return toast(err,'error');
          payload.task_type='reading_mixed';
          payload.content=JSON.stringify({ passage_html, questions });
        }
      } else if(skill==='listening'){
        const audio_url=document.getElementById('m-audiourl').value;
        if(!audio_url) return toast('Please upload an audio file for this task','error');
        if(TASK_QUESTIONS.length===0) return toast('Add at least one question','error');
        const err = validateQuestions(TASK_QUESTIONS);
        if(err) return toast(err,'error');
        payload.task_type='listening_mixed';
        payload.content=JSON.stringify({ audio_url, instructions: document.getElementById('m-instructions').value.trim(), questions: TASK_QUESTIONS });
      } else if(skill==='writing'){
        const prompt=document.getElementById('m-prompt').value.trim();
        const min_words=parseInt(document.getElementById('m-minwords').value)||150;
        const time_limit_minutes=document.getElementById('m-timelimit').value?parseInt(document.getElementById('m-timelimit').value):null;
        const image_url=document.getElementById('m-imageurl').value||null;
        if(!prompt) return toast('Enter writing instructions/prompt','error');
        payload.task_type='essay';
        payload.content=JSON.stringify({ prompt, min_words, time_limit_minutes, image_url });
      } else {
        const task_type=document.getElementById('m-type').value.trim();
        const content=document.getElementById('m-content').value.trim();
        try{ JSON.parse(content); } catch(e){ return toast('Content must be valid JSON','error'); }
        payload.task_type=task_type;
        payload.content=content;
      }

      result = S.editId ? await patch(`tasks?id=eq.${S.editId}`,payload) : await post('tasks',payload);
    }

    // Safety net: a write that returns no row almost always means an RLS
    // policy silently blocked it (insert went through, read-back didn't,
    // or vice versa). Surface this loudly instead of pretending it saved.
    if (!result || (Array.isArray(result) && result.length===0)) {
      throw new Error('Save did not return a confirmed record — check that you are logged in as admin and database permissions (RLS) allow this write.');
    }

    closeModal(); toast('Saved!','success'); loadAdminData();
  } catch(e){ toast(e.message,'error'); }
}

async function deleteItem(table,id){
  if(!confirm('Delete this item?'))return;
  try{
    const result = await api(`${table}?id=eq.${id}`, {method:'DELETE', prefer:'return=representation'});
    if (!result || (Array.isArray(result) && result.length===0)) {
      throw new Error('Nothing was deleted — you may not have permission, or it was already removed.');
    }
    toast('Deleted','success'); loadAdminData();
  }catch(e){ toast(e.message,'error'); }
}

// ── SUBMISSION REVIEW ──
function openSubmission(id){
  const sub=S.adminSubs.find(s=>s.id===id); S.currentSubId=id;
  const skill = sub.tasks?.skill;
  document.getElementById('sub-modal-title').textContent=`${skill==='writing'?'Review':'View'}: ${sub.students?.name}`;

  if(skill==='reading' || skill==='listening'){
    const task = S.adminTasks.find(t=>t.id===sub.task_id);
    let taskData={}; try{taskData=JSON.parse(task?.content||'{}');}catch(e){}
    // Full reading tests store questions nested inside passages; flatten them
    // into one list so the breakdown below (and its qi-based indexing into
    // savedAnswers, which the student-side grader also treats as flat) works
    // the same way for both single-passage and full-test submissions.
    const questions = taskData.passages ? taskData.passages.flatMap(p=>p.questions||[]) : (taskData.questions||[]);
    let savedAnswers={}; try{savedAnswers=JSON.parse(sub.answer||'{}');}catch(e){}
    const breakdown = questions.map((q,qi)=>{
      if(q.type==='matching'){
        const items=q.items||[];
        const savedMatch = savedAnswers[qi]&&typeof savedAnswers[qi]==='object'?savedAnswers[qi]:{};
        return items.map((it,ii)=>{
          const given=savedMatch[ii]||'(no answer)';
          const ok = given===it.answer;
          return `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px">
            <span>${qi+1}. ${it.label}</span>
            <span style="color:${ok?'#15803d':'#dc2626'}">${given} ${ok?'✓':'(answer: '+it.answer+')'}</span>
          </div>`;
        }).join('');
      }
      const given = savedAnswers[qi]!==undefined?savedAnswers[qi]:'(no answer)';
      const ok = q.type==='gap_fill'||q.type==='short_answer'
        ? String(given).toLowerCase().trim()===(q.answer||'').toLowerCase().trim()
        : given===q.answer;      return `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px">
        <span>${qi+1}. ${q.question}</span>
        <span style="color:${ok?'#15803d':'#dc2626'}">${given} ${ok?'✓':'(answer: '+q.answer+')'}</span>
      </div>`;
    }).join('');

    document.getElementById('sub-modal-body').innerHTML=`
      <p style="font-size:13px;color:var(--muted);margin-bottom:4px">Task: <strong>${sub.tasks?.title}</strong></p>
      <p style="font-size:13px;color:var(--muted);margin-bottom:14px">Submitted: ${new Date(sub.submitted_at).toLocaleString()}</p>
      <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:14px;margin-bottom:16px;text-align:center">
        <span style="font-size:22px;font-weight:700;color:#15803d">${sub.score}/${sub.total}</span>
        <div style="font-size:12px;color:var(--muted)">correct, auto-graded</div>
      </div>
      <div style="background:#f8fafc;border:1px solid var(--border);border-radius:10px;padding:4px 16px">${breakdown||'<p style="font-size:13px;color:var(--muted);padding:10px 0">No question breakdown available.</p>'}</div>`;
    document.getElementById('sub-save-btn').style.display='none';
    document.getElementById('sub-modal-overlay').classList.add('open');
    return;
  }

  document.getElementById('sub-save-btn').style.display='';
  document.getElementById('sub-modal-body').innerHTML=`
    <p style="font-size:13px;color:var(--muted);margin-bottom:4px">Task: <strong>${sub.tasks?.title}</strong></p>
    <p style="font-size:13px;color:var(--muted);margin-bottom:14px">Submitted: ${new Date(sub.submitted_at).toLocaleString()}</p>
    <div style="background:#f8fafc;border:1px solid var(--border);border-radius:10px;padding:16px;font-size:14px;line-height:1.8;white-space:pre-wrap;margin-bottom:16px">${sub.answer}</div>
    <div class="form-group"><label style="color:var(--text);font-size:13px;font-weight:600;display:block;margin-bottom:6px">Band Score (1–9)</label>
      <input type="number" id="score-input" min="1" max="9" step="0.5" value="${sub.score||''}" style="border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;font-size:14px;font-family:Inter,sans-serif;width:120px;outline:none"/></div>
    <div class="form-group"><label style="color:var(--text);font-size:13px;font-weight:600;display:block;margin-bottom:6px">Feedback</label>
      <textarea id="feedback-input" style="border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;font-family:Inter,sans-serif;width:100%;min-height:100px;outline:none;resize:vertical">${sub.feedback||''}</textarea></div>`;
  document.getElementById('sub-modal-overlay').classList.add('open');
}
async function saveScore(){
  const score=parseFloat(document.getElementById('score-input').value)||null, feedback=document.getElementById('feedback-input').value.trim()||null;
  try{ await patch(`submissions?id=eq.${S.currentSubId}`,{score,feedback}); toast('Feedback saved!','success'); closeSubModal(); loadAdminData(); }catch(e){ toast(e.message,'error'); }
}
function closeSubModal(){ document.getElementById('sub-modal-overlay').classList.remove('open'); }

// ── KEYBOARD ──
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    if(document.getElementById('screen-admin-login').classList.contains('active')) adminLogin();
  }
  if(e.key==='Escape'){ closeModal(); closeSubModal(); }
});

window.addEventListener('load',()=>{
  setTimeout(()=>{
    if (tryRestoreAdminSession()) { showScreen('screen-admin'); loadAdminData(); }
    else showScreen('screen-admin-login');
  },500);
});
</script>
